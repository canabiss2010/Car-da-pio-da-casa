<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Criar Cardápio</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="theme-color" content="#1F6F3B" />
    <script type="module" src="firebase-config.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 18px 12px 24px;
            background: linear-gradient(135deg, #1F6F3B 0%, #2ea47a 100%);
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        }

        .create-container {
            width: 100%;
            max-width: 440px;
        }

        .create-header {
            text-align: center;
            color: white;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .logo-text {
            font-size: 48px;
            margin-bottom: 12px;
            line-height: 1;
        }

        .create-header h1 {
            font-family: Oswald, sans-serif;
            font-size: 32px;
            margin: 0 0 8px;
            color: white;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .create-header p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.95);
            margin: 0;
            line-height: 1.6;
        }

        .create-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.16);
        }

        .create-card h2 {
            font-size: 22px;
            color: #1F6F3B;
            margin: 0 0 12px;
            font-family: Oswald, sans-serif;
        }

        .create-card p {
            font-size: 15px;
            color: #5c6a5a;
            margin: 0 0 24px;
            line-height: 1.7;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2c3b2f;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dde2dd;
            border-radius: 14px;
            font-size: 15px;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
            background: #fbfdf8;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1F6F3B;
            box-shadow: 0 0 0 4px rgba(31, 111, 59, 0.12);
        }

        .create-card button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1F6F3B 0%, #2ea47a 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        }

        .create-card button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(31, 111, 59, 0.2);
        }

        .create-card button[type="submit"]:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 22px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            padding: 0 8px;
            line-height: 1.6;
        }

        .form-footer a {
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, #1F6F3B 0%, #2ea47a 100%);
            padding: 12px 18px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 14px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .form-footer a:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(31, 111, 59, 0.18);
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 12px 20px;
            }

            .create-container {
                max-width: 100%;
            }

            .create-card {
                padding: 22px 18px;
            }

            .create-header h1 {
                font-size: 28px;
            }

            .create-card h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="create-container">
        <div class="create-header">
            <div class="logo-text">🍽️</div>
            <h1>Mamão com Açúcar</h1>
            <p>Crie seu cardápio compartilhado</p>
        </div>

        <div class="create-card">
            <h2>Começar</h2>
            <p>Dê um nome ao cardápio e seu nome pessoal</p>

            <form id="createForm">
                <div class="form-group">
                    <label for="menuName">Nome do Cardápio</label>
                    <input id="menuName" type="text" placeholder="Ex: Cardápio dos Panzarella" required
                        autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="creatorName">Seu Nome</label>
                    <input id="creatorName" type="text" placeholder="Digite seu nome" required autocomplete="off">
                </div>

                <button type="submit">✨ Criar Cardápio</button>
            </form>

            <div class="form-footer">
                <p style="margin: 0 0 12px 0;">Após criar, você compartilhará com sua família</p>
                <a href="join.html">👥 Já tenho um cardápio</a>
            </div>
        </div>
    </div>

    <script type="module" src="./js/create.js" defer></script>
</body>

</html>
