<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Criar Cardápio</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="theme-color" content="#1F6F3B" />
    <script type="module" src="firebase-config.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1F6F3B 0%, #2ea47a 100%);
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        }

        .create-container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .create-header {
            text-align: center;
            color: white;
            margin-bottom: 32px;
        }

        .create-header .logo-text {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .create-header h1 {
            font-family: Oswald, sans-serif;
            font-size: 28px;
            margin: 0 0 8px 0;
            color: white;
            font-weight: 700;
        }

        .create-header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }

        .create-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .create-card h2 {
            font-size: 20px;
            color: #1F6F3B;
            margin: 0 0 12px 0;
            font-family: Oswald, sans-serif;
        }

        .create-card p {
            font-size: 14px;
            color: #666;
            margin: 0 0 20px 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1F6F3B;
            box-shadow: 0 0 0 3px rgba(31, 111, 59, 0.1);
        }

        .create-card button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1F6F3B 0%, #2ea47a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        }

        .create-card button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(31, 111, 59, 0.3);
        }

        .create-card button[type="submit"]:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #999;
        }

        .form-footer a {
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, #1F6F3B 0%, #2ea47a 100%);
            padding: 10px 16px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 12px;
            transition: all 0.3s ease;
        }

        .form-footer a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(31, 111, 59, 0.3);
        }

        @media (max-width: 480px) {
            .create-container {
                padding: 16px;
            }

            .create-card {
                padding: 20px;
            }

            .create-header h1 {
                font-size: 24px;
            }

            .create-card h2 {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="create-container">
        <div class="create-header">
            <div class="logo-text">🍽️</div>
            <h1>Mamão com Açúcar</h1>
            <p>Crie seu cardápio compartilhado</p>
        </div>

        <div class="create-card">
            <h2>Começar</h2>
            <p>Dê um nome ao cardápio e seu nome pessoal</p>

            <form id="createForm">
                <div class="form-group">
                    <label for="menuName">Nome do Cardápio</label>
                    <input id="menuName" type="text" placeholder="Ex: Cardápio dos Panzarella" required
                        autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="creatorName">Seu Nome</label>
                    <input id="creatorName" type="text" placeholder="Digite seu nome" required autocomplete="off">
                </div>

                <button type="submit">✨ Criar Cardápio</button>
            </form>

            <div class="form-footer">
                <p style="margin: 0 0 12px 0;">Após criar, você compartilhará com sua família</p>
                <a href="join.html">👥 Já tenho um cardápio</a>
            </div>
        </div>
    </div>

    <script type="module" src="./js/create.js" defer></script>
</body>

</html>
